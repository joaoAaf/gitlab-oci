networks:
  gitlab-net:
    name: gitlab-net
    driver: bridge

services:
  gitlab:
    image: gitlab/gitlab-ce:18.9.2-ce.0
    container_name: gitlab
    restart: unless-stopped
    networks:
      - gitlab-net
    hostname: ${GITLAB_HOSTNAME}
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        # Configuração do URL externo do GitLab
        external_url 'http://${GITLAB_HOSTNAME}'
        
        # Configuração da porta SSH customizada
        gitlab_rails['gitlab_shell_ssh_port'] = ${GITLAB_PORTA_SSH}
        
        # Configuração do Container Registry
        registry_external_url 'http://${GITLAB_HOSTNAME}:5050'
        gitlab_rails['registry_enabled'] = true
    ports:
      - 80:80
      - 443:443
      - ${GITLAB_PORTA_SSH}:22
      - 5050:5050
    volumes:
      - ${GITLAB_HOME}/config:/etc/gitlab
      - ${GITLAB_HOME}/logs:/var/log/gitlab
      - ${GITLAB_HOME}/data:/var/opt/gitlab
    shm_size: '256m'

  gitlab-runner:
    image: gitlab/gitlab-runner:v18.9.0
    container_name: gitlab-runner
    restart: unless-stopped
    networks:
      - gitlab-net
    depends_on:
      - gitlab
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${GITLAB_HOME}/runner/config:/etc/gitlab-runner